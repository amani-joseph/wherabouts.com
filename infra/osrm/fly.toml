app = "wherabouts-osrm"
primary_region = "syd"

[build]
  dockerfile = "Dockerfile"

[[mounts]]
  source = "osrm_data"
  destination = "/data"

[http_service]
  internal_port = 5000
  force_https = true
  auto_stop_machines = false
  min_machines_running = 1

[[vm]]
  size = "performance-4x"
  memory = "16gb"  # car+bike+foot MLD graphs mmap ~3-4GB each (~10-12GB) + headroom

# Required secret (set once): fly secrets set OSRM_AUTH_TOKEN=<token>
# Caddy (the :5000 entrypoint) rejects requests without a matching Bearer token.
