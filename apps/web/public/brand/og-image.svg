<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="wherabouts — Open Graph social image">
  <title>wherabouts · Locations API</title>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0C0C0C"/>

  <!-- Subtle dot-grid pattern -->
  <defs>
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.2" fill="rgba(255,255,255,0.05)"/>
    </pattern>
    <!-- Radial fade mask -->
    <radialGradient id="fade" cx="50%" cy="50%" r="55%">
      <stop offset="0%"   stop-color="white" stop-opacity="1"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <mask id="grid-mask">
      <rect width="1200" height="630" fill="url(#fade)"/>
    </mask>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)" mask="url(#grid-mask)"/>

  <!-- Route mark — centred, large -->
  <!-- Original mark viewBox 152×84, scale to ~420px wide → scale factor ≈ 2.76 -->
  <g transform="translate(390, 130) scale(2.76)">
    <circle cx="14" cy="16" r="9.5" fill="none" stroke="#FFFFFF" stroke-width="3.5"/>
    <path d="M14,16 L38,72 L76,30 L114,72 L138,16"
          fill="none" stroke="#FFFFFF" stroke-width="11"
          stroke-linecap="round" stroke-linejoin="round"
          stroke-dasharray="15 11"/>
    <circle cx="138" cy="16" r="6.5" fill="#C8C8C8"/>
    <path d="M131,16 L145,16 L138,34 Z" fill="#C8C8C8"/>
  </g>

  <!-- Wordmark -->
  <text x="600" y="442"
        font-family="'JetBrains Mono', ui-monospace, monospace"
        font-size="68" font-weight="300" fill="#FFFFFF"
        letter-spacing="-1" text-anchor="middle">wherabouts</text>

  <!-- Tagline -->
  <text x="600" y="496"
        font-family="'JetBrains Mono', ui-monospace, monospace"
        font-size="22" font-weight="400" fill="#5A5A5A"
        letter-spacing="0.12em" text-anchor="middle">LOCATIONS API</text>

  <!-- Bottom domain -->
  <text x="600" y="594"
        font-family="'JetBrains Mono', ui-monospace, monospace"
        font-size="16" font-weight="400" fill="#2C2C2C"
        letter-spacing="0.08em" text-anchor="middle">wherabouts.com</text>
</svg>
